<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Panda Telecom 熊貓電訊 — 產品目錄</title>
<meta name="description" content="Momax、ARGO、SMARTCOBY、Sincos 等品牌手機配件、充電器、線材。紅磡黃埔實體店，即場購買。" />
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐼</text></svg>" />
<style>
:root {
  --primary: #111111;
  --accent: #e91e63;
  --accent2: #25D366;
  --text: #222;
  --muted: #888;
  --bg: #f8f8f8;
  --border: #e5e7eb;
  --radius: 12px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang HK", "Noto Sans CJK HK", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

.status-bar {
  background: var(--primary); color: #fff;
  text-align: center; font-size: 12px; padding: 5px 16px; font-weight: 500;
  transition: background .5s;
}
.status-bar.open { background: #15803d; }
.status-bar.closed { background: #92400e; }

nav {
  background: #fff; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
nav .inner {
  max-width: 1100px; margin: 0 auto; padding: 0 16px;
  display: flex; align-items: center; justify-content: space-between; height: 56px;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 15px; text-decoration: none; color: var(--text);
}
.logo-mark {
  width: 30px; height: 30px; background: var(--primary); color: #fff;
  border-radius: 7px; display: grid; place-items: center; font-size: 10px; font-weight: 800;
}
.nav-back {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 6px 14px; border-radius: 8px; background: #f0f0f0; color: #333;
  text-decoration: none; font-size: 13px;
}
.nav-back:hover { background: #e5e5e5; }

.main { max-width: 1100px; margin: 0 auto; padding: 16px; }

/* Banner */
.banner {
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  border-radius: 16px; padding: 28px 24px; margin: 8px 0 16px; color: #fff;
}
.banner h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
.banner p { font-size: 13px; opacity: .85; }

/* Brand tabs */
.brand-tabs {
  display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 16px;
}
.brand-tab {
  padding: 8px 16px; border-radius: 20px; background: #fff;
  border: 1.5px solid var(--border); font-size: 13px; color: #555;
  cursor: pointer; transition: all .15s; user-select: none;
  font-weight: 500; white-space: nowrap;
}
.brand-tab:hover { border-color: #bbb; }
.brand-tab.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.brand-tab .badge { font-size: 11px; opacity: .7; }

/* Search */
.search-wrap { margin: 8px 0; }
.search-input {
  width: 100%; padding: 12px 16px; border-radius: 10px;
  border: 1.5px solid var(--border); font-size: 15px; font-family: var(--font);
  outline: none; transition: border-color .2s; background: #fff;
}
.search-input:focus { border-color: var(--accent); }

/* Category pills */
.cats { display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0 12px; }
.cat-chip {
  padding: 5px 12px; border-radius: 16px; background: #fff;
  border: 1px solid var(--border); font-size: 11px; color: #777;
  cursor: pointer; transition: all .15s; user-select: none;
}
.cat-chip:hover { border-color: #bbb; }
.cat-chip.on { background: var(--primary); color: #fff; border-color: var(--primary); }

/* Stats */
.stats-bar {
  display: flex; gap: 16px; padding: 8px 0;
  font-size: 13px; color: var(--muted); align-items: center; flex-wrap: wrap;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 12px;
  margin-bottom: 100px;
}
.card {
  background: #fff; border-radius: var(--radius);
  overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06);
  transition: transform .2s, box-shadow .2s; cursor: pointer;
  display: flex; flex-direction: column;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }

.card-thumb {
  height: 170px; display: flex; align-items: center; justify-content: center;
  background: #fafafa; position: relative; overflow: hidden;
}
.card-thumb img {
  max-width: 92%; max-height: 92%; object-fit: contain;
  transition: transform .3s;
}
.card:hover .card-thumb img { transform: scale(1.05); }
.card-thumb .no-img {
  font-size: 48px; color: #ddd;
}

.card-body { padding: 10px 12px 14px; flex: 1; display: flex; flex-direction: column; }
.card-brand { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
.card-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-prices { margin-top: auto; }
.card-msrp { font-size: 17px; color: var(--accent); font-weight: 700; }
.card-srp { font-size: 12px; color: #bbb; text-decoration: line-through; margin-left: 6px; }
.card-wa {
  display: inline-flex; align-items: center; gap: 4px;
  margin-top: 8px; padding: 6px 12px;
  background: #dcf8c6; color: #075e54; border-radius: 6px;
  font-size: 11px; font-weight: 600; text-decoration: none;
  transition: background .2s;
}
.card-wa:hover { background: #c5e8b0; }

/* Product modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 1000;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: #fff; border-radius: 16px; max-width: 520px; width: 100%;
  max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2);
}
.modal-close {
  position: sticky; top: 0; float: right; z-index: 2;
  width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,.05);
  border: none; font-size: 20px; cursor: pointer; margin: 12px 12px 0 0;
  display: grid; place-items: center; color: #666;
}
.modal-close:hover { background: rgba(0,0,0,.1); }
.modal-img {
  width: 100%; max-height: 280px; object-fit: contain;
  background: #fafafa; display: block;
}
.modal-body { padding: 20px 24px 24px; }
.modal-brand { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.modal-name { font-size: 18px; font-weight: 700; margin: 4px 0 12px; line-height: 1.4; }
.modal-price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
.modal-msrp { font-size: 24px; color: var(--accent); font-weight: 700; }
.modal-srp { font-size: 15px; color: #bbb; text-decoration: line-through; }
.modal-desc { font-size: 14px; color: #555; line-height: 1.6; margin-bottom: 12px; }
.modal-features { margin-bottom: 16px; }
.modal-features li {
  font-size: 13px; color: #666; padding: 4px 0; line-height: 1.5;
  list-style: none;
}
.modal-features li::before { content: '✓ '; color: #25D366; font-weight: 700; }
.modal-wa-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 12px 24px; background: var(--accent2); color: #fff;
  border-radius: 10px; text-decoration: none; font-weight: 600; font-size: 14px;
  transition: background .2s;
}
.modal-wa-btn:hover { background: #1da851; }

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: #bbb; }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 15px; }

/* Footer */
.footer-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: #fff; border-top: 1px solid var(--border);
  padding: 10px 16px; display: flex; gap: 10px; z-index: 100;
}
.footer-bar .btn {
  flex: 1; padding: 12px; border-radius: 10px; text-align: center;
  text-decoration: none; color: #fff; font-weight: 600; font-size: 14px;
}
.footer-bar .btn-call { background: var(--primary); }
.footer-bar .btn-wa { background: var(--accent2); }

.site-footer { text-align: center; font-size: 11px; color: #bbb; padding: 16px 0 80px; }

@media (max-width: 500px) {
  .grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .card-thumb { height: 140px; }
  .card-name { font-size: 12px; }
  .brand-tab { font-size: 12px; padding: 6px 12px; }
}
</style>
</head>
<body>

<div class="status-bar" id="statusBar">🕐 檢查營業狀態中…</div>

<nav>
  <div class="inner">
    <a href="./" class="nav-brand">
      <div class="logo-mark">熊貓</div>
      <span>Panda Telecom</span>
    </a>
    <a class="nav-back" href="./">← 主頁</a>
  </div>
</nav>

<div class="main">

<div class="banner">
  <h1>📦 產品目錄</h1>
  <p id="bannerSub">10個品牌 · 440+ 產品 · WhatsApp 查詢庫存及報價</p>
</div>

<div class="stats-bar">
  <span>📦 <strong id="totalCount">0</strong> 件</span>
  <span>🏷️ <strong id="shownCount">0</strong> 顯示</span>
  <span>🖼️ <strong id="imgCount">0</strong> 有圖</span>
</div>

<div class="brand-tabs" id="brandTabs"></div>
<div class="search-wrap">
  <input class="search-input" id="search" placeholder="🔍 搜尋產品名、品牌或型號..." autocomplete="off">
</div>
<div class="cats" id="cats"></div>

<div id="list"></div>

<div class="site-footer">© 2026 Panda Telecom 熊貓電訊 · 紅磡黃埔108商場54號舖</div>

</div>

<!-- Product Detail Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img class="modal-img" id="modalImg" src="" alt="" />
    <div class="modal-body">
      <div class="modal-brand" id="modalBrand"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-price-row">
        <span class="modal-msrp" id="modalMsrp"></span>
        <span class="modal-srp" id="modalSrp"></span>
      </div>
      <div class="modal-desc" id="modalDesc"></div>
      <ul class="modal-features" id="modalFeatures"></ul>
      <a class="modal-wa-btn" id="modalWa" href="#" target="_blank" rel="noopener">💬 WhatsApp 查詢庫存及報價</a>
    </div>
  </div>
</div>

<div class="footer-bar">
  <a class="btn btn-call" href="tel:+85268557181">📞 致電 6855 7181</a>
  <a class="btn btn-wa" href="https://wa.me/85268557181?text=我想查詢產品" target="_blank" rel="noopener">💬 WhatsApp 詢價</a>
</div>

<script src="products-all.js"></script>
<script>
(function(){
  var P = ALL_PRODUCTS || [];
  
  // Brand data
  var brands = {};
  P.forEach(function(p){
    var b = p.brand;
    if (!brands[b]) brands[b] = { products: [], cats: new Set(), withImg: 0 };
    brands[b].products.push(p);
    brands[b].cats.add(p.category);
    if (p.image) brands[b].withImg++;
  });

  var brandNames = Object.keys(brands).sort();
  
  // Render brand tabs
  var tabsEl = document.getElementById('brandTabs');
  var allTab = document.createElement('span');
  allTab.className = 'brand-tab on';
  allTab.innerHTML = '全部 <span class="badge">'+P.length+'</span>';
  allTab.onclick = function(){ setBrand(''); };
  tabsEl.appendChild(allTab);

  brandNames.forEach(function(b){
    var tab = document.createElement('span');
    tab.className = 'brand-tab';
    tab.innerHTML = b + ' <span class="badge">'+brands[b].products.length+'</span>';
    tab.onclick = function(){ setBrand(b); };
    tabsEl.appendChild(tab);
  });

  var currentBrand = '';
  var currentCat = '';
  var currentQuery = '';

  function setBrand(b){
    currentBrand = b;
    currentCat = '';
    tabsEl.querySelectorAll('.brand-tab').forEach(function(t){ t.classList.remove('on'); });
    if (b) {
      var idx = brandNames.indexOf(b) + 1;
      tabsEl.children[idx].classList.add('on');
    } else {
      tabsEl.children[0].classList.add('on');
    }
    renderCats();
    render();
  }

  // Category pills
  function renderCats(){
    var cats = new Set();
    var src = currentBrand ? brands[currentBrand].products : P;
    src.forEach(function(p){ cats.add(p.category); });
    var catsArr = Array.from(cats).sort();
    
    var catsEl = document.getElementById('cats');
    catsEl.innerHTML = '';
    
    var allCat = document.createElement('span');
    allCat.className = 'cat-chip' + (currentCat ? '' : ' on');
    allCat.textContent = '全部分類';
    allCat.onclick = function(){
      currentCat = '';
      catsEl.querySelectorAll('.cat-chip').forEach(function(c){ c.classList.remove('on'); });
      allCat.classList.add('on');
      render();
    };
    catsEl.appendChild(allCat);
    
    catsArr.forEach(function(c){
      var chip = document.createElement('span');
      chip.className = 'cat-chip';
      chip.textContent = c;
      chip.onclick = function(){
        currentCat = c;
        catsEl.querySelectorAll('.cat-chip').forEach(function(x){ x.classList.remove('on'); });
        chip.classList.add('on');
        render();
      };
      catsEl.appendChild(chip);
    });
  }

  function render(){
    var q = (document.getElementById('search').value || '').toLowerCase().trim();
    var src = currentBrand ? brands[currentBrand].products : P;
    
    if (currentCat) src = src.filter(function(p){ return p.category === currentCat; });
    if (q) src = src.filter(function(p){
      return p.name.toLowerCase().indexOf(q) !== -1 || 
             (p.id || '').toLowerCase().indexOf(q) !== -1 ||
             (p.brand || '').toLowerCase().indexOf(q) !== -1;
    });

    document.getElementById('shownCount').textContent = src.length;
    
    if (!src.length) {
      document.getElementById('list').innerHTML = '<div class="empty-state"><div class="empty-icon">😕</div><p>冇搵到相關產品</p></div>';
      return;
    }

    var out = '<div class="grid">';
    src.forEach(function(p){
      var imgHtml = p.image 
        ? '<img src="'+p.image+'" alt="'+p.name+'" loading="lazy" onerror="this.parentElement.innerHTML=\\'<span class=no-img>📦</span>\\'" />'
        : '<span class="no-img">📦</span>';
      
      var srpHtml = p.msrp && p.srp && p.msrp < p.srp 
        ? '<span class="card-srp">$'+p.srp+'</span>' : '';
      
      out += '<div class="card" onclick="openModal(\''+p.id+'\')">';
      out += '<div class="card-thumb">'+imgHtml+'</div>';
      out += '<div class="card-body">';
      if (p.brand) out += '<div class="card-brand">'+p.brand+'</div>';
      out += '<div class="card-name">'+p.name+'</div>';
      out += '<div class="card-prices">';
      out += '<span class="card-msrp">$'+(p.msrp || p.srp)+'</span>';
      out += srpHtml;
      out += '</div>';
      out += '<a class="card-wa" href="https://wa.me/85268557181?text='+encodeURIComponent('我想查詢 '+p.brand+' '+p.name)+'" target="_blank" rel="noopener" onclick="event.stopPropagation()">💬 查詢</a>';
      out += '</div></div>';
    });
    out += '</div>';
    document.getElementById('list').innerHTML = out;
  }

  // Modal
  window.openModal = function(id){
    var p = P.find(function(x){ return x.id === id; });
    if (!p) return;
    
    document.getElementById('modalImg').src = p.image || '';
    document.getElementById('modalImg').style.display = p.image ? '' : 'none';
    document.getElementById('modalBrand').textContent = p.brand || '';
    document.getElementById('modalName').textContent = p.name;
    document.getElementById('modalMsrp').textContent = '$'+(p.msrp || p.srp);
    
    if (p.msrp && p.srp && p.msrp < p.srp) {
      document.getElementById('modalSrp').textContent = '$'+p.srp;
      document.getElementById('modalSrp').style.display = '';
    } else {
      document.getElementById('modalSrp').style.display = 'none';
    }
    
    document.getElementById('modalDesc').textContent = p.desc || '';
    document.getElementById('modalDesc').style.display = p.desc ? '' : 'none';
    
    var featEl = document.getElementById('modalFeatures');
    featEl.innerHTML = '';
    if (p.features && p.features.length) {
      p.features.forEach(function(f){
        var li = document.createElement('li');
        li.textContent = f;
        featEl.appendChild(li);
      });
    }
    
    document.getElementById('modalWa').href = 'https://wa.me/85268557181?text='+encodeURIComponent('我想查詢 '+p.brand+' '+p.name+' ('+p.id+')');
    document.getElementById('modal').classList.add('show');
  };

  window.closeModal = function(){
    document.getElementById('modal').classList.remove('show');
  };

  document.getElementById('modal').addEventListener('click', function(e){
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e){
    if (e.key === 'Escape') closeModal();
  });

  // Search
  var searchEl = document.getElementById('search');
  var timer;
  searchEl.addEventListener('input', function(){
    clearTimeout(timer);
    timer = setTimeout(render, 150);
  });

  // Init
  document.getElementById('totalCount').textContent = P.length;
  document.getElementById('imgCount').textContent = P.filter(function(p){ return p.image; }).length;
  renderCats();
  render();

  // Status bar
  (function(){
    var bar = document.getElementById('statusBar');
    var now = new Date();
    var hk = new Date(now.toLocaleString('en-US', {timeZone:'Asia/Hong_Kong'}));
    var h = hk.getHours(), m = hk.getMinutes();
    var totalMin = h * 60 + m;
    var isOpen = (totalMin >= 660 && totalMin < 1140); // 11:00-19:00
    if(isOpen) { bar.textContent = '🟢 而家營業中 · 11:00-19:00'; bar.className = 'status-bar open'; }
    else if(totalMin < 660) { bar.textContent = '🟠 未開門 · 今日 11:00 開舖'; bar.className = 'status-bar closed'; }
    else { bar.textContent = '🔴 已關門 · 聽日 11:00 再開'; bar.className = 'status-bar closed'; }
  })();
})();
</script>
</body>
</html>
