<meta charset="UTF-8">

<title>熊貓商城 Panda Mall — 熊貓電訊 Panda Telecom</title>
<style>
:root{--bg:#0d0d0d;--card:#1a1a1a;--text:#e5e5e5;--muted:#888;--border:#2a2a2a;--accent:#111;--gold:#d4a02b;--green:#22c55e;--radius:12px;--shadow:0 2px 16px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;scroll-padding-top:120px}

/* ── Header ── */
.header{background:#111;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.logo-img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.logo h1{font-size:16px;font-weight:700}
.logo p{font-size:10px;color:#888}
.hdr-cta{background:#fff;color:#111;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:transform .15s}
.hdr-cta:hover{transform:scale(1.03)}

/* ── Hero ── */
.hero{text-align:center;padding:40px 24px 20px;max-width:1200px;margin:0 auto}
.hero h2{font-size:28px;font-weight:800;margin-bottom:6px}
.hero p{color:var(--muted);font-size:14px;max-width:600px;margin:0 auto 16px;line-height:1.7}

/* ── Brand Tabs ── */
.brand-tabs{display:flex;gap:8px;justify-content:center;margin:0 auto 16px;flex-wrap:wrap}
.brand-tab{padding:8px 24px;border-radius:20px;border:2px solid var(--border);background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit}
.brand-tab:hover{border-color:#555;color:#fff}
.brand-tab.active{color:#fff}
.brand-tab.active[data-brand="sigma"]{background:var(--green);border-color:var(--green)}
.brand-tab.active[data-brand="niuwang"]{background:var(--gold);border-color:var(--gold)}
.brand-tab.active[data-brand="all"]{background:#555;border-color:#555}

/* ── Controls ── */
.controls{position:sticky;top:60px;z-index:90;background:var(--bg);padding:8px 24px 8px;border-bottom:1px solid var(--border)}
.controls-inner{max-width:1200px;margin:0 auto}
.search-wrap{display:flex;gap:8px;margin-bottom:6px}
.search-wrap input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap input::placeholder{color:var(--muted)}
.cat-tabs{display:flex;gap:6px;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;scrollbar-width:none;-ms-overflow-style:none}
.cat-tabs::-webkit-scrollbar{display:none}
.cat-tabs::after{content:'';position:sticky;right:0;width:40px;flex-shrink:0;background:linear-gradient(90deg,transparent,var(--bg));pointer-events:none}
.cat-tab{padding:4px 10px;border-radius:14px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;flex-shrink:0}
.cat-tab:hover{border-color:#555;color:#fff}
.cat-tab.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}

/* ── Product Grid ── */
.products{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .2s,border-color .2s;display:flex;flex-direction:column}
.product-card:hover{transform:translateY(-2px);border-color:#444}
.p-body{padding:16px 20px 20px;display:flex;flex-direction:column;flex:1}
.p-cat{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.p-brand{font-size:11px;color:var(--muted);margin-bottom:6px}
.p-name{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.4}
.p-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;flex:1}
.p-features{margin-bottom:14px;padding-left:16px}
.p-features li{font-size:12px;color:#999;line-height:1.7;list-style:disc}
.p-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:14px;margin-top:auto}
.p-price{font-size:20px;font-weight:800;color:#fff}
.p-price small{font-size:12px;font-weight:400;color:var(--muted)}
.p-btn{color:#fff;border:none;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.p-btn.sigma{background:var(--green)}
.p-btn.sigma:hover{background:#16a34a;transform:scale(1.02)}
.p-btn.niuwang{background:var(--gold)}
.p-btn.niuwang:hover{background:#b8922a;transform:scale(1.02)}

.count{text-align:center;padding:8px 24px 0;font-size:13px;color:var(--muted)}

.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:14px;margin-bottom:16px;transition:color .2s}
.back-link:hover{color:#fff}

@media(max-width:600px){
  .hero{padding:30px 16px 16px}
  .hero h2{font-size:22px}
  .products{grid-template-columns:1fr;padding:16px}
  .controls{padding:10px 16px 12px}
  .brand-tab{padding:6px 16px;font-size:13px}
}
</style>

function matchCategory(prodCat) {
  const c = (prodCat||'').toLowerCase();
  for(const cfg of catConfig) {
    for(const kw of cfg.match) {
      if(c.includes(kw.toLowerCase())) return cfg.id;
    }
  }
  return '其他';
}

function getBrand(p) {
  const b = (p.brand||'').toLowerCase();
  if(b.includes('牛魔王')||b.includes('2themax')) return 'niuwang';
  return 'sigma';
}

function getCatEmoji(catId) {
  for(const c of catConfig) {
    if(c.id === catId) return c.emoji;
  }
  return '📦';
}

/* ── Init ── */
Promise.all([
  fetch('sigma_products.json').then(r => r.json()),
  fetch('niuwang_products.json').then(r => r.json())
]).then(([sigma, niuwang]) => {
  // Tag products with their brand
  sigma.products.forEach(p => p._brand = 'sigma');
  niuwang.products.forEach(p => p._brand = 'niuwang');
  sigmaProducts = sigma.products;
  niuwangProducts = niuwang.products;
  renderCatTabs();
  // Check URL param for brand selection
  const urlParams = new URLSearchParams(window.location.search);
  const brandParam = urlParams.get('brand');
  if(brandParam === 'sigma' || brandParam === 'niuwang') {
    setBrand(brandParam);
  }
  renderProducts();
}).catch(() => {
  document.getElementById('products').innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">⚠️ 產品資料載入失敗，請稍後再試</p>';
});

/* ── Brand Filter ── */
function setBrand(brand) {
  currentBrand = brand;
  currentCat = 'all';
  document.querySelectorAll('.brand-tab').forEach(t => t.classList.toggle('active', t.dataset.brand === brand));
  renderCatTabs();
  document.getElementById('search').value = '';
  renderProducts();
}

/* ── Category Tabs ── */
function renderCatTabs() {
  const allProds = getFilteredProducts(true);
  const cats = new Set();
  allProds.forEach(p => cats.add(matchCategory(p.category)));
  
  const ordered = catConfig.filter(c => cats.has(c.id) || c.id === '其他');
  const container = document.getElementById('catTabs');
  container.innerHTML = `<button class="cat-tab active" data-cat="all" onclick="setCategory('all')">全部</button>` +
    ordered.filter(c => c.id !== '其他').map(c => 
      `<button class="cat-tab" data-cat="${c.id}" onclick="setCategory('${c.id}')">${c.emoji} ${c.label}</button>`
    ).join('') +
    (cats.has('其他') ? `<button class="cat-tab" data-cat="其他" onclick="setCategory('其他')">📦 其他</button>` : '');
}

function setCategory(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  renderProducts();
}

function filterProducts() { renderProducts(); }

function getFilteredProducts(ignoreCat) {
  let pool;
  if(currentBrand === 'sigma') pool = sigmaProducts;
  else if(currentBrand === 'niuwang') pool = niuwangProducts;
  else pool = [...sigmaProducts, ...niuwangProducts];
  
  if(ignoreCat) return pool;
  
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const targetCat = currentCat;
  
  return pool.filter(p => {
    // Category filter
    if(targetCat !== 'all') {
      const matched = matchCategory(p.category);
      if(matched !== targetCat) return false;
    }
    // Search
    if(q) {
      const haystack = (p.name + ' ' + p.brand + ' ' + (p.desc||'') + ' ' + (p.category||'') + ' ' + p.id).toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });
}
