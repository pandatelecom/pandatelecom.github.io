<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGMA 產品一覽 — 熊貓電訊 Panda Telecom</title>
<style>
:root{--bg:#0d0d0d;--card:#1a1a1a;--text:#e5e5e5;--muted:#888;--border:#2a2a2a;--accent:#111;--green:#22c55e;--radius:12px;--shadow:0 2px 16px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC","Microsoft JhengHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
.header{background:#111;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.hdr{max-width:1200px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.logo-img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.logo h1{font-size:16px;font-weight:700}
.logo p{font-size:10px;color:#888}
.hdr-cta{background:#fff;color:#111;border:none;padding:8px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:transform .15s}
.hdr-cta:hover{transform:scale(1.03)}

/* ── Hero ── */
.hero{text-align:center;padding:40px 24px 20px;max-width:1200px;margin:0 auto}
.hero h2{font-size:28px;font-weight:800;margin-bottom:6px}
.hero p{color:var(--muted);font-size:14px;max-width:500px;margin:0 auto 16px;line-height:1.7}

/* ── Controls ── */
.controls{position:sticky;top:73px;z-index:90;background:var(--bg);padding:12px 24px 16px;border-bottom:1px solid var(--border)}
.controls-inner{max-width:1200px;margin:0 auto}
.search-wrap{display:flex;gap:8px;margin-bottom:12px}
.search-wrap input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none}
.search-wrap input:focus{border-color:var(--green)}
.search-wrap input::placeholder{color:var(--muted)}
.cat-tabs{display:flex;gap:6px;flex-wrap:wrap}
.cat-tab{padding:6px 14px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap}
.cat-tab:hover{border-color:#555;color:#fff}
.cat-tab.active{background:var(--green);border-color:var(--green);color:#fff;font-weight:600}

/* ── Product Grid ── */
.products{max-width:1200px;margin:0 auto;padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:transform .2s,border-color .2s;display:flex;flex-direction:column}
.product-card:hover{transform:translateY(-2px);border-color:#444}
.p-body{padding:16px 20px 20px;display:flex;flex-direction:column;flex:1}
.p-cat{font-size:11px;font-weight:600;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.p-brand{font-size:11px;color:var(--muted);margin-bottom:6px}
.p-name{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.4}
.p-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;flex:1}
.p-features{margin-bottom:14px;padding-left:16px}
.p-features li{font-size:12px;color:#999;line-height:1.7;list-style:disc}
.p-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:14px;margin-top:auto}
.p-price{font-size:20px;font-weight:800;color:#fff}
.p-price small{font-size:12px;font-weight:400;color:var(--muted)}
.p-btn{background:var(--green);color:#fff;border:none;padding:10px 18px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.p-btn:hover{background:#16a34a;transform:scale(1.02)}

/* ── Count ── */
.count{text-align:center;padding:8px 24px 0;font-size:13px;color:var(--muted)}

/* ── Back link ── */
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:14px;margin-bottom:16px;transition:color .2s}
.back-link:hover{color:#fff}

/* ── Responsive ── */
@media(max-width:600px){
  .hero{padding:30px 16px 16px}
  .hero h2{font-size:22px}
  .products{grid-template-columns:1fr;padding:16px}
  .controls{padding:10px 16px 12px}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header class="header"><div class="hdr">
  <a href="https://pandatelecom.github.io/" class="logo">
    <img class="logo-img" src="assets/panda-logo.jpg" alt="熊貓電訊">
    <div><h1>熊貓電訊</h1><p>PANDA TELECOM</p></div>
  </a>
  <a href="https://wa.me/85268557181" class="hdr-cta">📱 WhatsApp 查詢</a>
</div></header>

<!-- ═══ HERO ═══ -->
<div class="hero">
  <a href="https://pandatelecom.github.io/" class="back-link">← 返回主頁</a>
  <h2>🛒 SIGMA 產品總覽</h2>
  <p>熊貓電訊獨家代理 SIGMA 精選產品 — 充電配件、耳機、音響、風扇、健康產品、智能科技，批發零售價，歡迎查詢訂購</p>
</div>

<!-- ═══ CONTROLS ═══ -->
<div class="controls"><div class="controls-inner">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="🔍 搜尋產品名稱或品牌..." oninput="filterProducts()">
  </div>
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" data-cat="all" onclick="setCategory('all')">全部</button>
    <button class="cat-tab" data-cat="充電器" onclick="setCategory('充電器')">🔌 充電器</button>
    <button class="cat-tab" data-cat="充電線" onclick="setCategory('充電線')">🔌 充電線</button>
    <button class="cat-tab" data-cat="充電寶" onclick="setCategory('充電寶')">🔋 充電寶</button>
    <button class="cat-tab" data-cat="耳機" onclick="setCategory('耳機')">🎧 耳機</button>
    <button class="cat-tab" data-cat="音響" onclick="setCategory('音響')">🔊 音響</button>
    <button class="cat-tab" data-cat="風扇" onclick="setCategory('風扇')">🌀 風扇</button>
    <button class="cat-tab" data-cat="健康產品" onclick="setCategory('健康產品')">❤️ 健康</button>
    <button class="cat-tab" data-cat="智能科技" onclick="setCategory('智能科技')">🤖 智能</button>
    <button class="cat-tab" data-cat="配件" onclick="setCategory('配件')">📱 配件</button>
    <button class="cat-tab" data-cat="工具" onclick="setCategory('工具')">🧰 工具</button>
  </div>
</div></div>

<div class="count" id="count"></div>
<div class="products" id="products"></div>

<script>
let products = [];
let currentCat = 'all';
const imgMap = {"argo-kc240":"p-1-10.jpg","argo-cc140":"p-1-13.jpg","argo-3in2-cable":"p-1-14.jpeg","argo-bu70":"p-1-15.jpg","argo-magnetic-powerbank-5000":"p-1-16.jpeg","argo-5in1-powerbank-10000":"p-1-17.jpeg","argo-w19":"p-1-18.jpeg","ssb5-solid-state":"p-1-19.jpeg","argo-tfc10-5in1":"p-1-20.jpg","pq001":"p-1-3.jpeg","sincos-sc-am02":"p-2-10.jpg","sincos-sc-dc06":"p-3-1.jpeg","sincos-sc-g3":"p-4-1.jpeg","sincos-s15-lte":"p-6-2.jpg","sincos-a40-lite":"p-2-11.jpg","sincos-eb01":"p-3-12.jpeg","qd-688":"p-4-14.jpg","sincos-sc-pscc":"p-6-21.jpeg","sincos-sc-mb650":"p-2-19.jpeg","sincos-sc-bp03c":"p-3-13.jpeg","sincos-sc-y4000":"p-4-15.jpeg","sincos-sc-nm360":"p-6-6.jpg","smartcoby-pro-30w":"p-3-14.jpeg","smartcoby-pro-slim-35w":"p-3-15.jpeg","smartcoby-pro-slim-35w-sakura":"p-3-16.jpeg","smartcoby-trio-67w":"p-3-17.jpeg","smartcoby-duo-40w":"p-3-18.jpeg","smartcoby-pro-slim-cable-35w":"p-3-19.jpg","10denki-jd-d1":"p-3-2.jpeg","10denki-j1-d2":"p-3-3.jpeg","t9-kids-watch":"p-4-18.jpeg","eb-con-24":"p-4-19.jpeg","eb-con-23":"p-4-23.jpeg","co-20-anc":"p-4-24.jpeg","co-21":"p-4-25.jpeg","smartbuds":"p-4-7.jpg","free-pods":"p-4-8.jpg","revolution-headphones":"p-5-1.jpeg","xspace-earphones":"p-5-11.jpeg","inspire-headphones":"p-5-12.jpg","leap-earbuds":"p-5-16.jpg","lonzuer-leap-speaker":"p-2-20.jpeg","cs-pd100":"p-5-3.jpeg","flashmini-stand":"p-5-4.jpeg","tl166":"p-5-5.jpeg","is-pps23":"p-5-7.jpeg","ismartdigi-sq15":"p-5-8.jpeg","ismartdigi-sq16":"p-5-9.jpeg","ismartdigi-40w-charger":"p-6-7.jpeg","ismartdigi-65w-charger":"p-2-3.jpg","ismartdigi-is-cll201":"p-2-4.jpg","ismartdigi-3in1-cable":"p-2-9.jpg","is-cc301-100w":"p-3-0.jpg","is-cc501-60w":"p-3-4.jpeg","tf-01":"p-1-6.jpg","rhythm-breeze-25":"p-1-7.jpeg","rhythm-silky-wind-mini":"p-1-8.jpeg","sincos-3d-circulator-fan":"p-1-9.jpeg","smart-wind-fan":"p-1-0.jpeg","heal-force-b01":"p-3-5.jpeg","motorola-mbp66n":"p-3-7.jpg","pe03-stylus":"p-3-8.jpg","smartcoby-pro-slim-cable-35w-purple":"p-5-16.jpg","argo-gd80":"p-4-1.jpeg","argo-md10-plus":"p-6-21.jpeg"};

fetch('sigma_products.json')
  .then(r => r.json())
  .then(data => {
    products = data.products;
    renderProducts();
  })
  .catch(() => {
    document.getElementById('products').innerHTML = '<p style="text-align:center;color:var(--muted);padding:40px">⚠️ 產品資料載入失敗，請稍後再試</p>';
  });

function setCategory(cat){
  currentCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  renderProducts();
}

function filterProducts(){ renderProducts(); }

function renderProducts(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  let filtered = products.filter(p => {
    if(currentCat !== 'all'){
      const cats = (p.category || '').toLowerCase();
      const match = currentCat === '充電器' ? cats.includes('充電器') || cats.includes('火牛') :
                    currentCat === '充電線' ? cats.includes('充電線') || cats.includes('cable') || cats.includes('線材') :
                    currentCat === '充電寶' ? cats.includes('充電寶') || cats.includes('電源') || cats.includes('power') :
                    cats.includes(currentCat.toLowerCase());
      if(!match) return false;
    }
    if(q){
      const haystack = (p.name + ' ' + p.brand + ' ' + (p.desc||'') + ' ' + (p.category||'')).toLowerCase();
      return haystack.includes(q);
    }
    return true;
  });

  document.getElementById('count').textContent = `共 ${filtered.length} 件產品`;

  const grid = document.getElementById('products');
  grid.innerHTML = filtered.map(p => {
    const emoji = getCatEmoji(p.category);
    const msg = encodeURIComponent(`你好，我想查詢產品：${p.name}（HKD $${p.price}）`);
    const pimg = imgMap[p.id] ? `https://pandatelecom.github.io/images/${imgMap[p.id]}` : '';
    return `<div class="product-card">
      ${pimg ? `<div class="p-img"><div class="p-img-bg" style="background:linear-gradient(135deg,#2a2a2a,#333);width:100%;height:200px;display:flex;align-items:center;justify-content:center;font-size:48px;border-bottom:1px solid var(--border)">${emoji}</div><img src="${pimg}" alt="${p.name}" loading="lazy" onerror="this.previousElementSibling.style.display='flex';this.style.display='none'" onload="this.previousElementSibling.style.display='none';this.style.display='block'" style="display:none;width:100%;height:200px;object-fit:contain;padding:16px;background:#222"></div>` : `<div class="p-img" style="display:flex;align-items:center;justify-content:center;font-size:48px">${emoji}</div>`}
      <div class="p-body">
        <div class="p-cat">${emoji} ${p.category || '其他'}</div>
        <div class="p-brand">${p.brand || ''}</div>
        <div class="p-name">${p.name}</div>
        <div class="p-desc">${p.desc || ''}</div>
        ${p.features && p.features.length ? `<ul class="p-features">${p.features.slice(0,4).map(f => `<li>${f}</li>`).join('')}</ul>` : ''}
        <div class="p-foot">
          <div class="p-price">$${p.price}<small> SRP</small></div>
          <a href="https://wa.me/85268557181?text=${msg}" class="p-btn" target="_blank" rel="noopener">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            查詢
          </a>
        </div>
      </div>
    </div>`;
  }).join('');
}

function getCatEmoji(cat){
  const c = (cat||'').toLowerCase();
  if(c.includes('充電器')||c.includes('火牛')) return '🔌';
  if(c.includes('充電線')||c.includes('cable')||c.includes('線材')) return '🔌';
  if(c.includes('充電寶')||c.includes('電源')||c.includes('power')) return '🔋';
  if(c.includes('耳機')||c.includes('earbud')||c.includes('head')) return '🎧';
  if(c.includes('音響')||c.includes('喇叭')||c.includes('speaker')) return '🔊';
  if(c.includes('風扇')||c.includes('fan')) return '🌀';
  if(c.includes('健康')||c.includes('血壓')||c.includes('體溫')) return '❤️';
  if(c.includes('智能')||c.includes('翻譯')||c.includes('mouse')||c.includes('手錶')) return '🤖';
  if(c.includes('配件')||c.includes('掛繩')||c.includes('保溫')) return '📱';
  if(c.includes('工具')||c.includes('螺絲')||c.includes('門鈴')) return '🧰';
  return '📦';
}
</script>
</body>
</html>
